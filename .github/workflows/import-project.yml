name: Importar projeto CIPTEA

on:
  push:
    branches: [main]
    paths:
      - ciptea-system-v0.1.0.zip
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-ciptea-project
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Verificar o arquivo do projeto
        id: archive
        shell: bash
        run: |
          if [ -f ciptea-system-v0.1.0.zip ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Aguardando o arquivo ciptea-system-v0.1.0.zip na raiz do repositório."
          fi

      - name: Extrair o código completo
        if: steps.archive.outputs.found == 'true'
        shell: bash
        run: |
          rm -rf /tmp/ciptea-import
          mkdir -p /tmp/ciptea-import
          unzip -q ciptea-system-v0.1.0.zip -d /tmp/ciptea-import
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            /tmp/ciptea-import/ciptea-system/ ./
          rm -f ciptea-system-v0.1.0.zip

      - name: Publicar os arquivos na branch main
        if: steps.archive.outputs.found == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração encontrada."
            exit 0
          fi
          git commit -m "feat: adicionar sistema completo CIPTEA"
          git push origin main
